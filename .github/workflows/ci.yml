name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: pip install -r requirements-dev.txt
      - name: Run ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r apps/control-api/requirements.txt
      - name: Run API tests
        run: cd apps/control-api && PYTHONPATH=. pytest
      - name: Run governance and forecasting tests
        run: pytest tests
      - name: Compile Python modules
        run: cd apps/control-api && python -m compileall app tests

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: security/trivy/trivy.yaml
          format: table
          exit-code: "1"
