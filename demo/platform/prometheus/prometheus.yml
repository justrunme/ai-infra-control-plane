global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: execution-plane-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: control-plane-api
    metrics_path: /metrics
    static_configs:
      - targets: ["control-api:8080"]
