apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-control-plane.fullname" . }}
  labels:
    {{- include "ai-control-plane.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ai-control-plane.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-control-plane.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ai-control-plane.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | quote }}
            - name: VLLM_BASE_URL
              value: {{ .Values.vllm.baseUrl | quote }}
            {{- if .Values.modelInventory.enabled }}
            - name: MODEL_INVENTORY_PATH
              value: {{ printf "%s/model_inventory.json" .Values.modelInventory.mountPath | quote }}
            {{- end }}
            {{- if .Values.secrets.externalSecrets.enabled }}
            - name: EXTERNAL_SECRETS_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.audit.jsonlEnabled }}
            - name: AUDIT_JSONL_PATH
              value: {{ .Values.audit.jsonlPath | quote }}
            {{- end }}
            {{- if .Values.audit.lokiEnabled }}
            - name: AUDIT_LOKI_ENABLED
              value: "true"
            - name: AUDIT_LOKI_URL
              value: {{ .Values.audit.lokiUrl | quote }}
            {{- end }}
            {{- if .Values.oidc.jwtVerify }}
            - name: OIDC_JWT_VERIFY
              value: "true"
            - name: OIDC_JWKS_URL
              value: {{ .Values.oidc.jwksUrl | quote }}
            {{- if .Values.oidc.jwtAudience }}
            - name: OIDC_JWT_AUDIENCE
              value: {{ .Values.oidc.jwtAudience | quote }}
            {{- end }}
            {{- if .Values.oidc.jwtIssuer }}
            - name: OIDC_JWT_ISSUER
              value: {{ .Values.oidc.jwtIssuer | quote }}
            {{- end }}
            {{- end }}
          {{- if .Values.secrets.externalSecrets.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "ai-control-plane.fullname" . }}-synced-secrets
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          {{- if or .Values.modelInventory.enabled .Values.governance.enabled .Values.fleet.enabled .Values.audit.jsonlEnabled }}
          volumeMounts:
            {{- if .Values.modelInventory.enabled }}
            - name: model-inventory
              mountPath: {{ .Values.modelInventory.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.governance.enabled }}
            - name: governance-config
              mountPath: /app/governance/registry/models.yaml
              subPath: models.yaml
              readOnly: true
            - name: governance-config
              mountPath: /app/governance/quota/policies.yaml
              subPath: policies.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.fleet.enabled }}
            - name: fleet-config
              mountPath: /app/fleet/clusters.yaml
              subPath: clusters.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.audit.jsonlEnabled }}
            - name: audit-logs
              mountPath: {{ .Values.audit.logMountPath }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or .Values.modelInventory.enabled .Values.governance.enabled .Values.fleet.enabled .Values.audit.jsonlEnabled }}
      volumes:
        {{- if .Values.modelInventory.enabled }}
        - name: model-inventory
          configMap:
            name: {{ include "ai-control-plane.fullname" . }}-inventory
        {{- end }}
        {{- if .Values.governance.enabled }}
        - name: governance-config
          configMap:
            name: {{ include "ai-control-plane.fullname" . }}-governance
        {{- end }}
        {{- if .Values.fleet.enabled }}
        - name: fleet-config
          configMap:
            name: {{ include "ai-control-plane.fullname" . }}-fleet
        {{- end }}
        {{- if .Values.audit.jsonlEnabled }}
        - name: audit-logs
          emptyDir: {}
        {{- end }}
      {{- end }}
