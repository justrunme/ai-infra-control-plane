apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-control-plane.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "ai-control-plane.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ai-control-plane.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ai-control-plane.name" . }}
    spec:
      containers:
        - name: control-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | quote }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
