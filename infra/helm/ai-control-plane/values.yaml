replicaCount: 1

nameOverride: ""

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

image:
  repository: ghcr.io/justrunme/ai-infra-control-plane
  tag: "0.1.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /metrics
  prometheus.io/port: "8080"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 0
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

ollama:
  baseUrl: http://ollama:11434

vllm:
  baseUrl: http://vllm:8000

# Model inventory rendered into a ConfigMap and mounted into the container.
# The API reads it through MODEL_INVENTORY_PATH.
modelInventory:
  enabled: true
  mountPath: /etc/ai-control-plane
  models:
    - name: llama-3.1-8b-instruct
      backend: ollama
      healthy: true
      latency_ms: 38
      capacity_tokens_per_second: 320
      estimated_hourly_cost_usd: 0.18
    - name: qwen2.5-14b-instruct
      backend: vllm
      healthy: true
      latency_ms: 55
      capacity_tokens_per_second: 540
      estimated_hourly_cost_usd: 0.42

governance:
  enabled: true
  registryModels: |
    models:
      qwen2.5-7b:
        risk_tier: low
        allowed_namespaces:
          - ai-dev
          - ai-prod
        max_monthly_budget_usd: 500
        pii_allowed: false
        external_provider: false
      llama3.1:8b:
        risk_tier: low
        allowed_namespaces:
          - ai-dev
          - ai-prod
        max_monthly_budget_usd: 400
        pii_allowed: false
        external_provider: false
      gpt-4.1-mini:
        risk_tier: high
        allowed_namespaces:
          - ai-prod
        max_monthly_budget_usd: 1500
        pii_allowed: false
        external_provider: true
      unknown-frontier-model:
        risk_tier: critical
        allowed_namespaces:
          - ai-dev
        max_monthly_budget_usd: 0
        pii_allowed: false
        external_provider: true
        forbidden: true
  quotaPolicies: |
    tenants:
      platform:
        requests_per_minute: 120
        tokens_per_day: 2000000
        max_monthly_budget_usd: 2000
        sensitive_data_allowed: true
      search:
        requests_per_minute: 80
        tokens_per_day: 1500000
        max_monthly_budget_usd: 1200
        sensitive_data_allowed: false
      finance:
        requests_per_minute: 30
        tokens_per_day: 500000
        max_monthly_budget_usd: 800
        sensitive_data_allowed: false

# Sync provider and gateway credentials from Vault via External Secrets Operator.
secrets:
  externalSecrets:
    enabled: false
    refreshInterval: 1h
    secretStoreRef:
      name: vault-ai-platform
      kind: ClusterSecretStore
    data:
      - secretKey: OPENAI_API_KEY
        remoteRef:
          key: secret/data/ai-platform/providers
          property: openai_api_key
      - secretKey: GATEWAY_API_KEYS
        remoteRef:
          key: secret/data/ai-platform/gateway
          property: api_keys
      - secretKey: AUDIT_SIGNING_KEY
        remoteRef:
          key: secret/data/ai-platform/control-plane
          property: audit_signing_key

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ai-control-plane.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false
  # Extra ingress rules merged with the default metrics/HTTP allowance.
  extraIngress: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
