replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

image:
  repository: ghcr.io/justrunme/ai-infra-control-plane
  tag: latest
  pullPolicy: IfNotPresent

ollama:
  baseUrl: http://ollama:11434

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
