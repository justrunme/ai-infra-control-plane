groups:
  - name: ai-platform-slos
    rules:
      - record: slo:gateway_chat_duration_seconds:p95
        expr: histogram_quantile(0.95, sum(rate(gateway_chat_duration_seconds_bucket[5m])) by (le))

      - record: slo:gateway_fallback_rate:ratio
        expr: |
          sum(rate(gateway_chat_fallback_total[5m]))
          /
          clamp_min(sum(rate(gateway_chat_requests_total[5m])), 1)

      - record: slo:gateway_shadow_failure_rate:ratio
        expr: |
          sum(rate(gateway_chat_shadow_total{outcome="error"}[5m]))
          /
          clamp_min(sum(rate(gateway_chat_shadow_total[5m])), 1)

      - record: slo:gateway_governance_block_rate:ratio
        expr: |
          sum(rate(gateway_governance_decisions_total{verdict="block"}[5m]))
          /
          clamp_min(sum(rate(gateway_governance_decisions_total[5m])), 1)

      - record: slo:control_plane_model_availability:ratio
        expr: avg(ai_control_model_available)

      - alert: GatewayLatencyP95High
        expr: slo:gateway_chat_duration_seconds:p95 > 2.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Gateway chat p95 latency exceeds 2.5s SLO

      - alert: GatewayFallbackRateHigh
        expr: slo:gateway_fallback_rate:ratio > 0.02
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Gateway fallback rate exceeds 2% SLO

      - alert: ShadowFailureRateHigh
        expr: slo:gateway_shadow_failure_rate:ratio > 0.05
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Shadow traffic failure rate exceeds 5% SLO

      - alert: GovernanceBlockRateHigh
        expr: slo:gateway_governance_block_rate:ratio > 0.10
        for: 30m
        labels:
          severity: info
        annotations:
          summary: Governance block rate exceeds 10% SLO

      - alert: InventoryDriftDetected
        expr: ai_control_inventory_in_sync == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: Model inventory drift detected for more than 15 minutes

      - alert: ModelAvailabilityLow
        expr: slo:control_plane_model_availability:ratio < 0.99
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Model availability dropped below 99% SLO
