apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-control-plane-secrets
  namespace: ai-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-ai-platform
    kind: ClusterSecretStore
  target:
    name: ai-control-plane-synced-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: secret/data/ai-platform/providers
        property: openai_api_key
    - secretKey: GATEWAY_API_KEYS
      remoteRef:
        key: secret/data/ai-platform/gateway
        property: api_keys
    - secretKey: AUDIT_SIGNING_KEY
      remoteRef:
        key: secret/data/ai-platform/control-plane
        property: audit_signing_key
